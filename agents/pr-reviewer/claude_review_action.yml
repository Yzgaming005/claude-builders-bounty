name: Claude PR Reviewer

# GitHub Action wrapper around agents/pr-reviewer/claude_review.py.
#
# Triggered on PR open / reopen / synchronize. Posts a structured Markdown
# review as a comment using `claude-review --post`. Requires:
#   - OPENROUTER_API_KEY (free-tier models work) configured as a repo secret.
#   - The action's GITHUB_TOKEN must have `pull-requests: write` (default).

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (e.g. 123)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reviewer
        run: |
          python -m pip install --upgrade pip
          # The reviewer has no Python dependencies — `gh` is the only one.
          echo "claude-review requires no pip packages"

      - name: Verify gh CLI
        run: gh --version

      - name: Run claude-review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.inputs.pr_number }}"
          else
            PR_URL="${{ github.event.pull_request.html_url }}"
          fi
          python agents/pr-reviewer/claude_review.py \
            --pr "${PR_URL}" \
            --post \
            --output "review.md"
          echo "--- Review posted ---"
          cat review.md