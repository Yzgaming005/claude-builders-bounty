patterns:
  - name: rm-rf-root-or-home
    regex: '\brm\s+(?:-[a-zA-Z]*[rR][fF]|-[a-zA-Z]*[fF][rR]|-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r|--recursive\s+--force|--force\s+--recursive|-rf|-fr)\s+([/~][^\s]*|~|\*|\.\./?[^\s]*)'
    severity: critical
    description: 'Recursive force removal targeting root (/), home (~), wildcard (*), or parent (..)'
  - name: rm-rf-any
    regex: '\brm\s+(?:-[a-zA-Z]*[rR][fF]|-[a-zA-Z]*[fF][rR]|-rf|-fr)\s+(\*|[/~][^\s]*|\.\./?[^\s]*)'
    severity: critical
    description: 'Recursive force removal of root paths, parent dirs, or wildcards'
  - name: mkfs-filesystem
    regex: '\bmkfs(\.[a-z0-9]+)?\s+'
    severity: critical
    description: 'Creating a filesystem wipes the target device'
  - name: dd-write
    regex: '\bdd\s+.*\bof=/dev/(sd|hd|nvme|xvd|vd|mmcblk)'
    severity: critical
    description: 'dd writing to a block device wipes the disk'
  - name: chmod-777
    regex: '\bchmod\s+(-[a-zA-Z]*R[a-zA-Z]*\s+)?777\s+'
    severity: high
    description: 'chmod 777 makes files world-writable'
  - name: chown-system
    regex: '\bchown\s+(-[a-zA-Z]*R[a-zA-Z]*\s+)?[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+\s+\/(etc|var|usr|bin|sbin)'
    severity: high
    description: 'Changing ownership of system directories'
  - name: drop-table
    regex: '\bDROP\s+(TABLE|DATABASE|SCHEMA|INDEX|VIEW|MATERIALIZED\s+VIEW)\b'
    severity: critical
    description: 'SQL DROP statement destroys schema/data'
  - name: truncate-table
    regex: '\bTRUNCATE\s+(TABLE\s+)?[a-zA-Z_][a-zA-Z0-9_.]*'
    severity: critical
    description: 'SQL TRUNCATE removes all rows without logging'
  - name: delete-from-no-where-line
    regex: '\bDELETE\s+FROM\s+[a-zA-Z_][a-zA-Z0-9_.]*\s*;'
    severity: critical
    description: 'DELETE FROM without WHERE (line-level)'
  - name: git-push-force-protected
    regex: '\bgit\s+push\s+.*(--force|--force-with-lease|-f)\b.*\b(origin|upstream)\s+(main|master|prod|production|release|stable)\b'
    severity: critical
    description: 'Force push to protected branch'
  - name: git-push-force-any
    regex: '\bgit\s+push\s+.*?(--force\b(?!-with-lease)|-f\b(?!-))'
    severity: high
    description: 'Force push (--force/-f) overwrites remote history'
  - name: git-reset-hard
    regex: '\bgit\s+reset\s+--hard\b'
    severity: high
    description: 'git reset --hard discards uncommitted changes'
  - name: git-clean-fd
    regex: '\bgit\s+clean\s+(-[a-zA-Z]*[fF][dD]|-[a-zA-Z]*[dD][fF]|-fd|-df)\b'
    severity: high
    description: 'git clean -fd removes untracked files and directories'
  - name: git-branch-delete-force
    regex: '\bgit\s+branch\s+(-[a-zA-Z]*[dD]\b.*-[a-zA-Z]*[fF]|-[a-zA-Z]*[fF][dD]|-Df|-fd)\s+'
    severity: medium
    description: 'git branch -D/-f force-deletes branch'
  - name: curl-pipe-shell
    regex: '\b(curl|wget|fetch)\b[^\n|]*\|\s*(sh|bash|zsh|fish|ksh|sudo\s+(sh|bash))\b'
    severity: critical
    description: 'Downloaded content piped to shell'
  - name: curl-pipe-python
    regex: '\b(curl|wget)\b[^\n|]*\|\s*python\b'
    severity: high
    description: 'Downloaded content piped to python'
  - name: shutdown-reboot
    regex: '\b(shutdown|reboot|halt|poweroff|init\s+[06]|systemctl\s+(poweroff|reboot|halt))\b'
    severity: critical
    description: 'System shutdown/reboot command'
  - name: fork-bomb
    regex: ':\(\)\s*\{\s*:\|:&\s*\}\s*;\s*:'
    severity: critical
    description: 'Classic bash fork bomb'
  - name: wipefs
    regex: '\bwipefs\s+'
    severity: critical
    description: 'wipefs erases filesystem signatures'
  - name: shred-device
    regex: '\bshred\s+.*(/dev/|--force\s+/dev/)'
    severity: critical
    description: 'shred overwrites device contents'
